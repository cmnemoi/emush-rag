services:
  app:
    image: ghcr.io/cmnemoi/emush-rag/api:${IMAGE_TAG:-latest}
    container_name: emush-rag-api
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      - traefik.http.routers.emush-rag-api.rule=Host(`api.askneron.cmnemoi.com`)
      - traefik.http.routers.emush-rag-api.entrypoints=websecure
      - traefik.http.routers.emush-rag-api.tls.certresolver=letsencrypt
      - traefik.http.routers.emush-rag-api.service=emush-rag-api
      - traefik.http.services.emush-rag-api.loadbalancer.server.port=8080
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VECTOR_STORE_URL=${VECTOR_STORE_URL}
      - VECTOR_STORE_PORT=${VECTOR_STORE_PORT}
    depends_on:
      - vector_store
      - jaeger
    networks:
      - emush_rag
      - traefik-proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  vector_store:
    image: chromadb/chroma:1.3.5
    volumes:
      - ./chroma:/data
    restart: unless-stopped
    networks:
      - emush_rag

  jaeger:
    image: jaegertracing/all-in-one:1.71.0
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - emush_rag
    restart: unless-stopped

  grafana:
    image: ghcr.io/cmnemoi/emush-rag/grafana:${IMAGE_TAG:-latest}
    container_name: emush-rag-grafana
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      - traefik.http.routers.emush-rag-grafana.rule=Host(`grafana.askneron.cmnemoi.com`)
      - traefik.http.routers.emush-rag-grafana.entrypoints=websecure
      - traefik.http.routers.emush-rag-grafana.tls.certresolver=letsencrypt
      - traefik.http.routers.emush-rag-grafana.service=emush-rag-grafana
      - traefik.http.services.emush-rag-grafana.loadbalancer.server.port=3000
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    depends_on:
      - jaeger
    networks:
      - emush_rag
      - traefik-proxy
    restart: unless-stopped

networks:
  emush_rag:
    driver: bridge
  traefik-proxy:
    external: true

volumes:
  grafana-data:
